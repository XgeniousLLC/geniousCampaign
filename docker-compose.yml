services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: geniuscampaign
      POSTGRES_USER: geniuscampaign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geniuscampaign}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U geniuscampaign']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://geniuscampaign:${POSTGRES_PASSWORD:-geniuscampaign}@postgres:5432/geniuscampaign
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
