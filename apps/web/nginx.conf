server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — any unknown path serves index.html, React Router handles the rest.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets can be cached aggressively; index.html must not be, so a
  # deploy is picked up on next load rather than served stale.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
